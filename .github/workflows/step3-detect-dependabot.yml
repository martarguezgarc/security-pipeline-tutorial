name: "Step 3: Detectar configuración de Dependabot"

on:
  push:
    branches: [main]
    paths:
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  detect-dependabot:
    name: Verificar y completar tutorial
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que estamos en el Paso 3
        id: check-step
        run: |
          if grep -q "Paso 3 de 3" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "✅ Estamos en el Paso 3"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No estamos en el Paso 3 — ignorando"
          fi

      - name: Verificar que dependabot.yml es YAML válido
        if: steps.check-step.outputs.active == 'true'
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/dependabot.yml'))"
          echo "✅ .github/dependabot.yml válido"

      - name: Actualizar README a Completado
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/finish.md',
              'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md'
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              message: '🎉 Tutorial completado — ¡enhorabuena!',
              content: encoded,
              sha: file.sha,
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            core.notice('🎉 Tutorial completado — README actualizado');

      - name: Crear Issue de certificado
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const badge = `![Security Pipeline Tutorial](https://img.shields.io/badge/Security_Pipeline_Tutorial-Completado_%E2%9C%85-4caf50?style=flat-square&logo=githubactions&logoColor=white)`;

            const body = `## 🎉 ¡Tutorial completado!

            **${context.actor}** ha completado el tutorial de seguridad en pipelines de GitHub Actions.

            ---

            ### Habilidades demostradas

            | ✅ | Habilidad |
            |---|---|
            | ✅ | SAST con Semgrep — análisis estático de código |
            | ✅ | Corrección de SQL Injection |
            | ✅ | Corrección de Command Injection |
            | ✅ | Eliminación de credenciales hardcodeadas |
            | ✅ | Configuración de Dependabot para SCA |

            ---

            ### Tu badge

            Copia este código y pégalo en el \`README.md\` de tu perfil de GitHub (\`github.com/${context.actor}/${context.actor}\`):

            \`\`\`markdown
            ${badge}
            \`\`\`

            > Si no tienes repositorio de perfil, créalo en https://github.com/new con el nombre **${context.actor}**

            ---
            *Completado el ${new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'long', year: 'numeric'})} · Security Pipeline Tutorial*`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 Tutorial completado — Certificado de finalización',
              body: body,
              labels: []
            });

            // Cerrar el issue inmediatamente como "completed"
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

            core.notice(`🎉 Certificado creado: ${issue.html_url}`);
