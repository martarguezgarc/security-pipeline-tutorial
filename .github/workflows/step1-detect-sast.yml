name: "Step 1: Detectar workflow de Semgrep"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sast.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-sast:
    name: Verificar y avanzar al Paso 2
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que estamos en el Paso 1
        id: check-step
        run: |
          if grep -q "Paso 1 de 3" README.md 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "✅ Estamos en el Paso 1"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No estamos en el Paso 1 — ignorando"
          fi

      - name: Verificar que el workflow de Semgrep existe
        if: steps.check-step.outputs.active == 'true'
        run: |
          if [ ! -f ".github/workflows/sast.yml" ]; then
            echo "::error::No se encontró .github/workflows/sast.yml"
            exit 1
          fi
          echo "✅ .github/workflows/sast.yml encontrado"

      - name: Actualizar README al Paso 2
        if: steps.check-step.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync(
              process.env.GITHUB_WORKSPACE + '/.github/steps/step2.md',
              'utf8'
            );
            const encoded = Buffer.from(content).toString('base64');

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md'
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              message: '📖 Paso 2 desbloqueado: Corrige las vulnerabilidades',
              content: encoded,
              sha: file.sha,
              committer: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com'
              }
            });

            core.notice('✅ Semgrep añadido — el README ahora muestra el Paso 2');
